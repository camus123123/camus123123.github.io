<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코어젬스톤 효율 계산기</title>

<style>
    body {
        font-family: "맑은 고딕", sans-serif;
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
    }

    h2 {
        text-align: center;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: #f8f8f8;
        white-space: pre-line;
    }
</style>
</head>
<body>

<h2>코어젬스톤 효율 계산기</h2>

<div class="input-group">
    <label>코어젬스톤 가격 (1포인트)</label>
    <input type="number" id="singlePrice" placeholder="예: 80000">
</div>

<div class="input-group">
    <label>거울세계의 코어 젬스톤 가격 (5포인트)</label>
    <input type="number" id="bundlePrice" placeholder="예: 400000">
</div>

<button onclick="calculate()">효율 계산</button>

<div id="result"></div>

<script>
function calculate() {
    const singlePrice = parseFloat(document.getElementById("singlePrice").value);
    const bundlePrice = parseFloat(document.getElementById("bundlePrice").value);

    if (isNaN(singlePrice) || isNaN(bundlePrice) || singlePrice <= 0 || bundlePrice <= 0) {
        document.getElementById("result").innerText =
            "올바른 가격을 입력해주세요.";
        return;
    }

    const bundleUnitPrice = bundlePrice / 5;

    let resultText = "";

    if (singlePrice < bundleUnitPrice) {
        const diffPercent =
            ((bundleUnitPrice - singlePrice) / bundleUnitPrice) * 100;

        resultText =
            `추천 구매: 코어젬스톤\n\n` +
            `코어젬스톤 1포인트 가격: ${singlePrice.toLocaleString()} 메소\n` +
            `거울세계의 코어 젬스톤 환산 가격: ${bundleUnitPrice.toLocaleString()} 메소\n\n` +
            `코어젬스톤이 약 ${diffPercent.toFixed(2)}% 더 효율적입니다.`;
    }
    else if (singlePrice > bundleUnitPrice) {
        const diffPercent =
            ((singlePrice - bundleUnitPrice) / singlePrice) * 100;

        resultText =
            `추천 구매: 거울세계의 코어 젬스톤\n\n` +
            `코어젬스톤 1포인트 가격: ${singlePrice.toLocaleString()} 메소\n` +
            `거울세계의 코어 젬스톤 환산 가격: ${bundleUnitPrice.toLocaleString()} 메소\n\n` +
            `거울세계의 코어 젬스톤이 약 ${diffPercent.toFixed(2)}% 더 효율적입니다.`;
    }
    else {
        resultText =
            `두 상품의 효율이 동일합니다.\n\n` +
            `1포인트당 가격: ${singlePrice.toLocaleString()} 메소`;
    }

    document.getElementById("result").innerText = resultText;
}
</script>

    <a href="/">뒤로가기</a>
</body>
</html>
